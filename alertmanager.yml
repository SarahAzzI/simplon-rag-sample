global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: discord

receivers:
  - name: discord
    discord_configs:
      - webhook_url: "${DISCORD_WEBHOOK_URL}"
        title: "🚨 Alerte RAG — {{ .GroupLabels.alertname }}"
        message: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}"