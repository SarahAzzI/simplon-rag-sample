name: Backend CI/CD

on:
  push:
    branches: ['**']
    paths:
      - 'api/**'
      - '.github/workflows/backend-ci-cd.yml'
  workflow_dispatch:

env:
  PROJECT_ID: simplon-souhaib-formation
  REGION: europe-west1
  IMAGE: europe-west1-docker.pkg.dev/simplon-souhaib-formation/back-simplon-rag/backend
  CLOUD_RUN_SERVICE: api

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Lint & Test — toutes les branches
  # ─────────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: api/pyproject.toml

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest --tb=short
        env:
          MISTRAL_API_KEY: fake-key-for-ci
          POSTGRES_PASSWORD: fake-password-for-ci
        # Si pas encore de tests : remplacer par `echo "no tests yet"`

  # ─────────────────────────────────────────
  # JOB 2 : Build & Push — main seulement
  # ─────────────────────────────────────────
  build-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build & Push
        run: |
          SHA="${{ steps.meta.outputs.short_sha }}"
          docker build \
            --tag "${{ env.IMAGE }}:$SHA" \
            --tag "${{ env.IMAGE }}:latest" \
            ./api
          docker push "${{ env.IMAGE }}:$SHA"
          docker push "${{ env.IMAGE }}:latest"

  # ─────────────────────────────────────────
  # JOB 3 : Deploy — déclenchement MANUEL
  # ─────────────────────────────────────────
  deploy:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      id-token: write

    environment: production

    steps:
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image "${{ env.IMAGE }}:${{ needs.build-push.outputs.image_tag }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --quiet
