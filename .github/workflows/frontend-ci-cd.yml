name: Frontend CI/CD

on:
  push:
    branches: ['**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  workflow_dispatch:

env:
  PROJECT_ID: simplon-souhaib-formation
  REGION: europe-west1
  IMAGE: europe-west1-docker.pkg.dev/simplon-souhaib-formation/front-simplon-rag/frontend
  CLOUD_RUN_SERVICE: frontend

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Lint — toutes les branches
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: frontend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

  # ─────────────────────────────────────────
  # JOB 2 : Build & Push — main seulement
  # ─────────────────────────────────────────
  build-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build & Push
        run: |
          SHA="${{ steps.meta.outputs.short_sha }}"
          docker build \
            --tag "${{ env.IMAGE }}:$SHA" \
            --tag "${{ env.IMAGE }}:latest" \
            ./frontend
          docker push "${{ env.IMAGE }}:$SHA"
          docker push "${{ env.IMAGE }}:latest"

  # ─────────────────────────────────────────
  # JOB 3 : Deploy — déclenchement MANUEL
  # ─────────────────────────────────────────
  deploy:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      id-token: write

    environment: production

    steps:
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image "${{ env.IMAGE }}:${{ needs.build-push.outputs.image_tag }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --quiet
